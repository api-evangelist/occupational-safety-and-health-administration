aid: occupational-safety-and-health-administration
name: Occupational Safety and Health Administration
description: >-
  The Occupational Safety and Health Administration (OSHA) is a US federal agency
  that sets and enforces standards for safe and healthful working conditions.
  OSHA provides data APIs for accessing workplace injury and illness data,
  establishment inspection records, and compliance information.
